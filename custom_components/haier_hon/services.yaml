set_mqtt_log_level:
  name: Imposta livello log MQTT
  description: >-
    Cambia il livello di log del canale MQTT realtime di pyhOn. Di default il
    rumore dei tentativi di riconnessione è silenziato (warning). Imposta
    "debug" per diagnosticare i problemi di push realtime, poi "warning" per
    risilenziare. Non persiste: al riavvio di Home Assistant torna silenziato.
  fields:
    level:
      name: Livello
      description: Livello di log da applicare al canale MQTT realtime di pyhOn.
      required: true
      default: debug
      example: debug
      selector:
        select:
          options:
            - "debug"
            - "info"
            - "warning"
            - "error"
